config:
  aws:region: ap-southeast-2
  nag:lambdaMemoryMb: "1536"
  nag:logRetentionDays: "14"
  # Neon settings — defaults in `src/config.ts` (region aws-ap-southeast-2,
  # pg17, project/branch/database/role all named "nag", 0.25–1 CU, default
  # suspend). Override here per-stack if needed.
  # nag:neonRegionId: aws-ap-southeast-2
  # nag:neonMinCu: "0.25"
  # nag:neonMaxCu: "1"
  # nag:neonSuspendTimeoutSeconds: "0"
  #
  # nag:neonApiKey is the Neon API token (Account Settings → API Keys).
  # Set via:
  #   pulumi config set --secret nag:neonApiKey <token>
  #
  # nag:deviceTokenSecret is the HMAC-SHA256 signing key for per-device
  # bearer tokens. Generate + set via:
  #   pulumi config set --secret nag:deviceTokenSecret "$(openssl rand -base64 48)"
  # Rotating invalidates every previously-issued token (clients hit 401
  # and re-register).
  #
  # Custom domain (optional — both must be set or neither). When set, Pulumi
  # creates an ACM cert + API Gateway custom domain + Route 53 alias, and the
  # `apiUrl` stack output points at the friendly URL instead of the raw
  # `*.execute-api.*` invoke URL. Set via:
  #   pulumi config set nag:hostedZoneName <existing-route53-zone-name>
  #   pulumi config set nag:apiDomainName  <subdomain.example.com>
  nag:hostedZoneName: auctionready.co.nz
  nag:apiDomainName: nagapi.auctionready.co.nz
  nag:clerkIssuer: https://feasible-lynx-68.clerk.accounts.dev
