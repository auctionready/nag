name: CI

on:
  push:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'app/**'
              - 'packages/**'
              - 'tools/**'
              - 'patches/**'
              - 'docs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'eslint.config.mjs'
              - '.prettierrc'
              - '.prettierignore'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'packages/api-client/**'
              - '.github/workflows/ci.yml'

  frontend-checks:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v6

      - uses: volta-cli/action@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - uses: actions/cache@v5
        id: pnpm-modules
        with:
          path: |
            node_modules
            app/node_modules
            packages/*/node_modules
            backend/node_modules
          key: pnpm-modules-${{ runner.os }}-${{ runner.arch }}-node${{ hashFiles('package.json') }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile --prefer-offline
        if: steps.pnpm-modules.outputs.cache-hit != 'true'

      - run: pnpm exec turbo run typecheck check:circular //#lint //#format:check:app --filter=!@nag/backend

  frontend-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: volta-cli/action@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - uses: actions/cache@v5
        id: pnpm-modules
        with:
          path: |
            node_modules
            app/node_modules
            packages/*/node_modules
            backend/node_modules
          key: pnpm-modules-${{ runner.os }}-${{ runner.arch }}-node${{ hashFiles('package.json') }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile --prefer-offline
        if: steps.pnpm-modules.outputs.cache-hit != 'true'

      - run: npx expo export --platform ios
        working-directory: app

  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v6

      - uses: volta-cli/action@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - uses: actions/cache@v5
        id: pnpm-modules
        with:
          path: |
            node_modules
            app/node_modules
            packages/*/node_modules
            backend/node_modules
          key: pnpm-modules-${{ runner.os }}-${{ runner.arch }}-node${{ hashFiles('package.json') }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile --prefer-offline
        if: steps.pnpm-modules.outputs.cache-hit != 'true'

      - run: pnpm exec turbo run test --filter='./packages/**'

      - run: pnpm --filter=@nag/app exec jest --passWithNoTests --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./junit
          JEST_JUNIT_OUTPUT_NAME: results.xml

      - uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Jest Test Report
          path: app/junit/results.xml
          reporter: jest-junit

  backend-build-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - uses: volta-cli/action@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - uses: actions/cache@v5
        id: pnpm-modules
        with:
          path: |
            node_modules
            app/node_modules
            packages/*/node_modules
            backend/node_modules
          key: pnpm-modules-${{ runner.os }}-${{ runner.arch }}-node${{ hashFiles('package.json') }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile --prefer-offline
        if: steps.pnpm-modules.outputs.cache-hit != 'true'
        working-directory: .

      - run: dotnet tool restore

      - run: dotnet csharpier check .

      - run: dotnet restore

      - run: dotnet build --configuration Release --no-restore

      - run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=results.trx"

      - uses: dorny/test-reporter@v3
        if: always()
        with:
          name: .NET Test Report
          path: backend/**/TestResults/results.trx
          reporter: dotnet-trx

      # Fails if a backend change drifts packages/api-client/src/endpoint-definition.ts
      # from what's committed. openapi.json is generated as an intermediate
      # artifact and is gitignored.
      - name: endpoint-definition.ts is up to date
        run: pnpm check:openapi
