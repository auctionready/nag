name: CI

on:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: volta-cli/action@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm run lint

  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: volta-cli/action@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx expo export --platform ios
        working-directory: app

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: volta-cli/action@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter='./packages/**' run test

      - run: pnpm --filter=@nag/app exec jest --passWithNoTests --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./junit
          JEST_JUNIT_OUTPUT_NAME: results.xml

      - uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Jest Test Report
          path: app/junit/results.xml
          reporter: jest-junit

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - run: dotnet tool restore

      - run: dotnet csharpier check .

      - run: dotnet restore

      - run: dotnet build --configuration Release --no-restore

      - run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=results.trx"

      - uses: dorny/test-reporter@v3
        if: always()
        with:
          name: .NET Test Report
          path: backend/**/TestResults/results.trx
          reporter: dotnet-trx
