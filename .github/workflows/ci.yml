name: CI

on:
  push:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'app/**'
              - 'packages/**'
              - 'tools/**'
              - 'patches/**'
              - 'docs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'eslint.config.mjs'
              - '.prettierrc'
              - '.prettierignore'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'packages/api-client/**'
              - '.github/workflows/ci.yml'

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v6

      - uses: volta-cli/action@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - uses: actions/cache@v5
        with:
          path: node_modules/.pnpm
          key: pnpm-virtualstore-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile --prefer-offline

      - run: pnpm exec turbo run typecheck test check:circular //#lint //#format:check:app --filter=!@nag/backend

      - uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Jest Test Report
          path: app/junit/results.xml
          reporter: jest-junit

      - run: npx expo export --platform ios
        working-directory: app

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - uses: volta-cli/action@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - uses: actions/cache@v5
        with:
          path: node_modules/.pnpm
          key: pnpm-virtualstore-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile --prefer-offline

      - run: dotnet tool restore
        working-directory: backend

      - run: pnpm exec turbo run check:format build test --filter=@nag/backend

      - uses: dorny/test-reporter@v3
        if: always()
        with:
          name: .NET Test Report
          path: backend/**/TestResults/*.trx
          reporter: dotnet-trx

      # Fails if a backend change drifts packages/api-client/src/endpoint-definition.ts
      # from what's committed. openapi.json is generated as an intermediate
      # artifact and is gitignored.
      - name: endpoint-definition.ts is up to date
        run: pnpm --filter @nag/backend check:openapi
