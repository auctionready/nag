name: EAS update

on:
  workflow_dispatch:
    inputs:
      branch:
        description: EAS Update branch (maps to the build's channel)
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production
      message:
        description: Update message (defaults to the commit SHA)
        required: false
        type: string
        default: ""

concurrency:
  group: eas-update-${{ github.ref }}-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/node-setup

      # `eas update` does NOT read a build profile's eas.json `env` block, so the
      # published JS bundle must be built with the same env the target build used
      # or it will mismatch (config + fingerprint runtimeVersion). The branch name
      # matches the build profile name, so mirror that profile's `env` here from
      # the single source of truth (eas.json) rather than duplicating values.
      - name: Resolve update env from eas.json
        id: env
        working-directory: app
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          PROFILE_ENV=$(jq -e --arg b "$BRANCH" '.build[$b].env' eas.json)
          echo "app_variant=$(echo "$PROFILE_ENV" | jq -re '.APP_VARIANT')" >> "$GITHUB_OUTPUT"
          echo "signin_providers=$(echo "$PROFILE_ENV" | jq -re '.EXPO_PUBLIC_SIGNIN_PROVIDERS')" >> "$GITHUB_OUTPUT"

      # `--environment` loads the hosted env vars (NAG_API_BASE_URL,
      # EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY, ...) from the same EAS environment the
      # build profile uses, so they match the build exactly. The branch name
      # equals the environment name (preview / production).
      - name: EAS update (${{ inputs.branch }})
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_VARIANT: ${{ steps.env.outputs.app_variant }}
          EXPO_PUBLIC_SIGNIN_PROVIDERS: ${{ steps.env.outputs.signin_providers }}
        run: |
          BRANCH="${{ inputs.branch }}"
          MESSAGE="${{ inputs.message }}"
          if [ -z "$MESSAGE" ]; then
            MESSAGE="CI update ${{ github.sha }}"
          fi
          eas update --branch "$BRANCH" --environment "$BRANCH" --message "$MESSAGE" --non-interactive
