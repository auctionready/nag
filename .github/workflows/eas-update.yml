name: EAS update

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target EAS environment (its channel/branch share this name)
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production
      message:
        description: Update message (defaults to the commit SHA)
        required: false
        type: string
        default: ""
      force:
        description: Publish even if no finished build matches the fingerprint (skips the guard)
        required: false
        type: boolean
        default: false

concurrency:
  group: eas-update-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/node-setup

      # eas-cli is scoped to app/mise.toml; install the app folder's tools so the
      # bare `eas` calls below (working-directory: app) resolve via mise.
      - uses: jdx/mise-action@v4
        with:
          working_directory: app

      # `eas update` does NOT read a build profile's eas.json `env` block, so the
      # published JS bundle must be built with the same env the target build used
      # or it will mismatch (config + fingerprint runtimeVersion). The environment
      # name matches the build profile name, so mirror that profile's `env` here
      # from the single source of truth (eas.json) rather than duplicating values.
      - name: Resolve update env from eas.json
        id: env
        working-directory: app
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          PROFILE_ENV=$(jq -e --arg p "$ENVIRONMENT" '.build[$p].env' eas.json)
          echo "app_variant=$(echo "$PROFILE_ENV" | jq -re '.APP_VARIANT')" >> "$GITHUB_OUTPUT"
          echo "signin_providers=$(echo "$PROFILE_ENV" | jq -re '.EXPO_PUBLIC_SIGNIN_PROVIDERS')" >> "$GITHUB_OUTPUT"

      # Guard: an update only installs on a build whose runtimeVersion matches.
      # runtimeVersion uses the fingerprint policy, so compute the same hash EAS
      # does (`eas fingerprint:generate` reads app/fingerprint.config.cjs) and
      # require at least one finished build on this channel with that exact
      # runtimeVersion — otherwise the publish would reach zero devices ("no
      # compatible builds"). Bypass with the `force` input when a matching build
      # is in flight. APP_VARIANT is the only env input that moves the fingerprint
      # (it sets the native bundle id); pass the environment's value resolved from
      # eas.json above — the hosted env feeds `extra`, which is skipped.
      - name: Guard — require a build matching the fingerprint
        if: ${{ !inputs.force }}
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_VARIANT: ${{ steps.env.outputs.app_variant }}
        run: |
          ENVIRONMENT="${{ inputs.environment }}"
          HASH=$(eas fingerprint:generate --platform ios \
            --json --non-interactive | jq -re '.hash')
          echo "Target channel=$ENVIRONMENT runtimeVersion=$HASH"
          MATCHES=$(eas build:list \
            --platform ios \
            --channel "$ENVIRONMENT" \
            --runtime-version "$HASH" \
            --status finished \
            --limit 1 \
            --json --non-interactive | jq 'length')
          if [ "$MATCHES" -eq 0 ]; then
            echo "::error::No finished iOS build on channel '$ENVIRONMENT' has runtimeVersion $HASH."
            echo "The native layer changed since the last build — publishing now would reach 0 devices."
            echo "Run an EAS build on the '$ENVIRONMENT' channel first, or re-run with force=true if a matching build is in flight."
            exit 1
          fi
          echo "Found a matching build — safe to publish."

      # `--environment` loads the hosted env vars (NAG_API_BASE_URL,
      # EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY, ...) so they match the build exactly.
      # `--branch` is the EAS Update branch, which shares the environment's name
      # (preview / production) and is what the same-named channel points at.
      - name: EAS update (${{ inputs.environment }})
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_VARIANT: ${{ steps.env.outputs.app_variant }}
          EXPO_PUBLIC_SIGNIN_PROVIDERS: ${{ steps.env.outputs.signin_providers }}
        run: |
          ENVIRONMENT="${{ inputs.environment }}"
          MESSAGE="${{ inputs.message }}"
          if [ -z "$MESSAGE" ]; then
            MESSAGE="CI update ${{ github.sha }}"
          fi
          eas update --branch "$ENVIRONMENT" --environment "$ENVIRONMENT" --message "$MESSAGE" --non-interactive
