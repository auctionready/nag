name: EAS update

on:
  workflow_dispatch:
    inputs:
      branch:
        description: EAS Update branch (maps to the build's channel)
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production
      message:
        description: Update message (defaults to the commit SHA)
        required: false
        type: string
        default: ""
      force:
        description: Publish even if no finished build matches the fingerprint (skips the guard)
        required: false
        type: boolean
        default: false

concurrency:
  group: eas-update-${{ github.ref }}-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/node-setup

      # `eas update` does NOT read a build profile's eas.json `env` block, so the
      # published JS bundle must be built with the same env the target build used
      # or it will mismatch (config + fingerprint runtimeVersion). The branch name
      # matches the build profile name, so mirror that profile's `env` here from
      # the single source of truth (eas.json) rather than duplicating values.
      - name: Resolve update env from eas.json
        id: env
        working-directory: app
        env:
          BRANCH: ${{ inputs.branch }}
        run: |
          PROFILE_ENV=$(jq -e --arg b "$BRANCH" '.build[$b].env' eas.json)
          echo "app_variant=$(echo "$PROFILE_ENV" | jq -re '.APP_VARIANT')" >> "$GITHUB_OUTPUT"
          echo "signin_providers=$(echo "$PROFILE_ENV" | jq -re '.EXPO_PUBLIC_SIGNIN_PROVIDERS')" >> "$GITHUB_OUTPUT"

      # Pin runtimeVersion from the fingerprint BEFORE publishing. `eas update`
      # evaluates app.config.ts, which reads fingerprint.generated.json; without
      # this step it would fall back to the sentinel runtime version and mismatch
      # every real build. APP_VARIANT must match the update step's so the native
      # config (and thus the fingerprint) is computed identically.
      - name: Generate runtime version fingerprint
        working-directory: app
        env:
          APP_VARIANT: ${{ steps.env.outputs.app_variant }}
        run: node scripts/generate-runtime-version.mjs

      # Guard: an update only installs on a build whose runtimeVersion matches.
      # Since we pin runtimeVersion to the fingerprint hash, require at least one
      # finished build on this channel with that exact runtimeVersion — otherwise
      # the publish would reach zero devices ("no compatible builds"). Bypass with
      # the `force` input when you know a matching build is in flight.
      - name: Guard — require a build matching the fingerprint
        if: ${{ !inputs.force }}
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BRANCH="${{ inputs.branch }}"
          HASH=$(jq -re '.runtimeVersion' fingerprint.generated.json)
          echo "Target channel=$BRANCH runtimeVersion=$HASH"
          MATCHES=$(eas build:list \
            --platform ios \
            --channel "$BRANCH" \
            --runtime-version "$HASH" \
            --status finished \
            --limit 1 \
            --json --non-interactive | jq 'length')
          if [ "$MATCHES" -eq 0 ]; then
            echo "::error::No finished iOS build on channel '$BRANCH' has runtimeVersion $HASH."
            echo "The native layer changed since the last build — publishing now would reach 0 devices."
            echo "Run an EAS build for the '$BRANCH' profile first, or re-run with force=true if a matching build is in flight."
            exit 1
          fi
          echo "Found a matching build — safe to publish."

      # `--environment` loads the hosted env vars (NAG_API_BASE_URL,
      # EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY, ...) from the same EAS environment the
      # build profile uses, so they match the build exactly. The branch name
      # equals the environment name (preview / production).
      - name: EAS update (${{ inputs.branch }})
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_VARIANT: ${{ steps.env.outputs.app_variant }}
          EXPO_PUBLIC_SIGNIN_PROVIDERS: ${{ steps.env.outputs.signin_providers }}
        run: |
          BRANCH="${{ inputs.branch }}"
          MESSAGE="${{ inputs.message }}"
          if [ -z "$MESSAGE" ]; then
            MESSAGE="CI update ${{ github.sha }}"
          fi
          eas update --branch "$BRANCH" --environment "$BRANCH" --message "$MESSAGE" --non-interactive
