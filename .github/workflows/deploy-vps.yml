name: Deploy VPS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger VPS deploy
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          install -m 600 /dev/null /tmp/key
          echo "$SSH_KEY" > /tmp/key
          ssh -o StrictHostKeyChecking=accept-new -i /tmp/key \
            nag@"$VPS_HOST" \
            '~/nag/ops/deploy.sh'
          rm /tmp/key
