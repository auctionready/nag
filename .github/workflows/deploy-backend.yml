name: Deploy backend

on:
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: backend/global.json

      # package-lambda.sh runs with --no-restore so it doesn't churn local
      # dev's package state; restore explicitly here before invoking it.
      - name: Restore backend
        working-directory: backend
        run: dotnet restore

      - name: Package Lambda
        run: backend/scripts/package-lambda.sh

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install infra deps
        working-directory: infra
        run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      - uses: actions/cache@v4
        with:
          path: ~/.pulumi/plugins
          key: pulumi-plugins-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}
          restore-keys: pulumi-plugins-${{ runner.os }}-

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: prod
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
