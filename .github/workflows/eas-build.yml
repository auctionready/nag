name: EAS build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        type: choice
        default: preview
        options:
          - preview
          - development
          - production
      submit:
        description: Submit to App Store Connect after build (production only)
        required: false
        type: boolean
        default: false

concurrency:
  group: eas-build-${{ github.ref }}-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/node-setup

      - name: Resolve profile
        id: profile
        env:
          INPUT_PROFILE: ${{ github.event.inputs.profile }}
        run: |
          if [ -n "$INPUT_PROFILE" ]; then
            echo "value=$INPUT_PROFILE" >> "$GITHUB_OUTPUT"
          else
            echo "value=preview" >> "$GITHUB_OUTPUT"
          fi

      # Resolve runtimeVersion on the runner BEFORE `eas build`. eas-cli reads
      # app.config.ts here to record the build's runtimeVersion, and that record
      # is what eas-update.yml's guard queries (build:list --runtime-version).
      # fingerprint.generated.json is gitignored (not committed, not uploaded), so
      # without this step app.config falls back to the sentinel and the record
      # would never match a real update. The EAS server independently regenerates
      # the same file via the eas-build-post-install hook (app/package.json) for
      # the value embedded in the binary — both compute the identical hash from
      # the same lockfile. APP_VARIANT comes from the profile's eas.json env (the
      # single source of truth) because EAS applies that block server-side, not on
      # the runner.
      - name: Generate runtime version fingerprint
        working-directory: app
        run: |
          PROFILE="${{ steps.profile.outputs.value }}"
          APP_VARIANT=$(jq -re --arg p "$PROFILE" '.build[$p].env.APP_VARIANT' eas.json)
          echo "Profile $PROFILE -> APP_VARIANT=$APP_VARIANT"
          APP_VARIANT="$APP_VARIANT" node scripts/generate-runtime-version.mjs

      # All builds run async (--no-wait). For production+submit, use EAS's
      # --auto-submit so the App Store Connect upload fires server-side once
      # the build finishes, with no long-running CI job to babysit.
      - name: EAS build (iOS, ${{ steps.profile.outputs.value }})
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_TEAM_ID: ${{ vars.EXPO_APPLE_TEAM_ID }}
        run: |
          PROFILE="${{ steps.profile.outputs.value }}"
          ARGS="--platform ios --profile $PROFILE --non-interactive --no-wait"
          if [ "$PROFILE" = "production" ] && [ "${{ inputs.submit }}" = "true" ]; then
            ARGS="$ARGS --auto-submit"
          fi
          eas build $ARGS
