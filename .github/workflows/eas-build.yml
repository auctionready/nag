name: EAS build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        type: choice
        default: preview
        options:
          - preview
          - development

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: volta-cli/action@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Resolve profile
        id: profile
        env:
          INPUT_PROFILE: ${{ github.event.inputs.profile }}
        run: |
          if [ -n "$INPUT_PROFILE" ]; then
            echo "value=$INPUT_PROFILE" >> "$GITHUB_OUTPUT"
          else
            echo "value=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: EAS build (iOS, ${{ steps.profile.outputs.value }})
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_TEAM_ID: ${{ vars.EXPO_APPLE_TEAM_ID }}
        run: npx eas-cli@latest build --platform ios --profile ${{ steps.profile.outputs.value }} --non-interactive --no-wait
