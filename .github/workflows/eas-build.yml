name: EAS build

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target EAS environment (uses the same-named eas.json build profile)
        required: true
        type: choice
        default: preview
        options:
          - preview
          - development
          - production
      submit:
        description: Submit to App Store Connect after build (production only)
        required: false
        type: boolean
        default: false

concurrency:
  group: eas-build-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/node-setup

      - name: Resolve environment
        id: environment
        env:
          INPUT_ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          if [ -n "$INPUT_ENVIRONMENT" ]; then
            echo "value=$INPUT_ENVIRONMENT" >> "$GITHUB_OUTPUT"
          else
            echo "value=preview" >> "$GITHUB_OUTPUT"
          fi

      # runtimeVersion uses the `fingerprint` policy (app.config.ts): EAS computes
      # and embeds it server-side at build time, tuned by app/fingerprint.config.cjs.
      # Nothing to pre-compute on the runner.

      # All builds run async (--no-wait). For production+submit, use EAS's
      # --auto-submit so the App Store Connect upload fires server-side once
      # the build finishes, with no long-running CI job to babysit. The
      # environment name is also the eas.json build profile name (--profile).
      - name: EAS build (iOS, ${{ steps.environment.outputs.value }})
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_TEAM_ID: ${{ vars.EXPO_APPLE_TEAM_ID }}
        run: |
          ENVIRONMENT="${{ steps.environment.outputs.value }}"
          ARGS=(--platform ios --profile "$ENVIRONMENT" --non-interactive --no-wait)
          if [ "$ENVIRONMENT" = "production" ] && [ "${{ inputs.submit }}" = "true" ]; then
            ARGS+=(--auto-submit)
          fi
          eas build "${ARGS[@]}"
