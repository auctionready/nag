name: expo-check

# Runs on every PR (including Renovate PRs) to guard against dependency
# bumps that drift Expo native modules off their SDK-pinned versions.
# This is the backstop for auto-merged JS-only updates: a PR that breaks
# `expo install --check` will fail this job and won't merge.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches: [main]

concurrency:
  group: expo-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/node-setup

      # Validate every workspace package's Expo deps match the installed SDK.
      - name: expo install --check
        run: pnpm --filter @nag/app exec expo install --check

      # expo-doctor isn't a project dependency; fetch it on demand. `pnpm exec`
      # sets the cwd to the @nag/app package so the check runs against it.
      - name: expo-doctor
        run: pnpm --filter @nag/app exec npx --yes expo-doctor
