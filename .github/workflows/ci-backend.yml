name: CI backend

on:
  push:
    paths:
      - "backend/**"
      - "packages/api-client/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/ci-backend.yml"
      - ".github/actions/node-setup/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: backend/global.json

      - uses: ./.github/actions/node-setup

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/global.json', 'backend/Directory.Build.props', 'backend/.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - run: dotnet tool restore
        working-directory: backend

      - run: pnpm exec turbo run check:format build test //#check:openapi --filter=@nag/backend

      - uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: always()
        with:
          name: .NET Test Report
          path: backend/**/TestResults/*.trx
          reporter: dotnet-trx
