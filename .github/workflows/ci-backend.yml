name: CI backend

on:
  push:
    paths:
      - "backend/**"
      - "packages/api-client/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/ci-backend.yml"
      - ".github/actions/node-setup/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: backend/global.json

      - uses: ./.github/actions/node-setup

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/global.json', 'backend/Directory.Build.props', 'backend/.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: |
            backend/**/bin
            backend/**/obj
          key: dotnet-build-${{ runner.os }}-${{ hashFiles('backend/**/*.cs', 'backend/**/*.csproj', 'backend/Directory.Build.props', 'backend/global.json') }}
          restore-keys: dotnet-build-${{ runner.os }}-

      - run: dotnet tool restore
        working-directory: backend

      - run: dotnet restore -p:Configuration=Debug
        working-directory: backend

      - run: dotnet csharpier check .
        working-directory: backend

      - run: dotnet build --configuration Release --no-restore
        working-directory: backend

      - run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=results.trx"
        working-directory: backend

      - run: pnpm check:openapi

      - uses: dorny/test-reporter@v3
        if: always()
        with:
          name: .NET Test Report
          path: backend/**/TestResults/*.trx
          reporter: dotnet-trx
