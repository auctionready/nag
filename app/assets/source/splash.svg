<svg xmlns="http://www.w3.org/2000/svg" width="1242" height="2688" viewBox="0 0 1242 2688">
  <rect width="1242" height="2688" fill="#FFF8F0"/>
  <!-- Cadence icon contents (background blends with splash). 7 dots + "nag" wordmark -->
  <!-- Dot row centered at (621, 1054) -->
  <g transform="translate(421 1034)">
    <circle cx="20" cy="20" r="20" fill="#1A1410"/>
    <circle cx="80" cy="20" r="20" fill="#1A1410"/>
    <circle cx="140" cy="20" r="20" fill="#1A1410"/>
    <circle cx="200" cy="20" r="19" fill="none" stroke="#1A1410" stroke-width="2" stroke-dasharray="5 5"/>
    <circle cx="260" cy="20" r="20" fill="#1A1410"/>
    <circle cx="320" cy="20" r="20" fill="#1A1410"/>
    <circle cx="380" cy="20" r="20" fill="#FF5A36"/>
  </g>
  <!-- "nag" wordmark, font-size 210, centered around y=1284 -->
  <text x="621" y="1284" font-family="Space Grotesk" font-weight="700" font-size="210" letter-spacing="-10.5" text-anchor="middle" dominant-baseline="middle" fill="#1A1410">nag</text>
  <!-- 3 orange loading dots, 30px each, 22px gap, total width 134, centered at y=1514 -->
  <g transform="translate(554 1499)">
    <circle cx="15" cy="15" r="15" fill="#FF5A36"/>
    <circle cx="67" cy="15" r="15" fill="#FF5A36"/>
    <circle cx="119" cy="15" r="15" fill="#FF5A36"/>
  </g>
  <!-- "loading your excuses…" mono text, font-size ~48, centered at y=1634 -->
  <text x="621" y="1634" font-family="JetBrains Mono, monospace" font-size="48" letter-spacing="2" text-anchor="middle" dominant-baseline="middle" fill="#2A211B">loading your excuses...</text>
</svg>
