packages:
  - "packages/*"
  - "app"
  - "backend"
dedupePeerDependents: true
# eslint-plugin-react-hooks v7 / babel-plugin-react-compiler import
# `zod-validation-error/v4`, a subpath only present in v4.0.0+. pnpm otherwise
# resolves the v3 line (3.5.4) which dropped that subpath, breaking plugin load.
overrides:
  zod-validation-error: "^4.0.2"
allowBuilds:
  "@clerk/shared": false
  "@pulumi/neon": true
  "@sentry/cli": true
  better-sqlite3: true
  browser-tabs-lock: false
  bufferutil: false
  core-js: false
  esbuild: true
  lefthook: true
  msgpackr-extract: false
  unrs-resolver: false
  utf-8-validate: false

catalog:
  "@types/better-sqlite3": ^7.6.13
  "@types/node": ^25.9.2
  "@typescript/native-preview": 7.0.0-dev.20260605.1
  better-sqlite3: ^12.10.0
  concurrently: ^10.0.3
  date-fns: ^4.4.0
  drizzle-orm: ^0.45.2
  typescript: ~6.0.3
  vitest: ^4.1.8
  zod: ^4.4.3
