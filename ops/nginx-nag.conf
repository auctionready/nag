# nginx reverse proxy for the nag Expo dev server.
#
# Drop into /etc/nginx/sites-available/nag.conf, replace the hostname,
# symlink into sites-enabled/, and reload nginx. Then run
#   sudo certbot --nginx -d your.hostname
# which will upgrade this HTTP-only block to HTTPS on 443 and add a
# redirect from 80 — you end up with a standard certbot-managed TLS
# vhost without having to hand-write cert paths.

server {
	listen      80;
	listen [::]:80;
	server_name dev.example.com;

	# Metro uses WebSockets for HMR, log streaming, and the RN DevTools
	# bridge. Default nginx timeouts (60s) would drop them.
	location / {
		proxy_pass http://127.0.0.1:8081;
		proxy_http_version 1.1;

		proxy_set_header Upgrade           $http_upgrade;
		proxy_set_header Connection        "upgrade";
		proxy_set_header Host              $host;
		proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_read_timeout 24h;
		proxy_send_timeout 24h;

		# Bundle responses are big; don't waste RAM buffering them.
		proxy_buffering off;
	}
}
