# nginx reverse proxy for the nag Expo dev server.
#
# Drop into /etc/nginx/sites-available/nag.conf and symlink into
# sites-enabled, or `include` from your main nginx config. Replace
# `dev.example.com` with the real hostname before reloading.
#
# This assumes the cert already exists (certbot, wildcard, etc.). If
# not, comment out the TLS block and let `certbot --nginx` fill it in.

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name dev.example.com;

	ssl_certificate     /etc/letsencrypt/live/dev.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/dev.example.com/privkey.pem;

	# Metro uses WebSockets for HMR, log streaming, and the RN DevTools
	# bridge. Default nginx timeouts (60s) would drop them.
	location / {
		proxy_pass http://127.0.0.1:8081;
		proxy_http_version 1.1;

		proxy_set_header Upgrade           $http_upgrade;
		proxy_set_header Connection        "upgrade";
		proxy_set_header Host              $host;
		proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_read_timeout 24h;
		proxy_send_timeout 24h;

		# Bundle responses are big; don't waste RAM buffering them.
		proxy_buffering off;
	}
}

server {
	listen      80;
	listen [::]:80;
	server_name dev.example.com;
	return 301  https://$host$request_uri;
}
