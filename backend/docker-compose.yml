services:
  postgres:
    image: postgres:17
    container_name: nag-postgres
    environment:
      POSTGRES_USER: nag
      POSTGRES_PASSWORD: nag
      POSTGRES_DB: nag
    ports:
      - "5432:5432"
    volumes:
      - nag-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nag-pg:
