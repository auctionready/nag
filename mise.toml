[tools]
node = "24"
pnpm = "11"

[settings]
lockfile = true

[env]
# Put mise's (cwd-aware) shims on PATH so tools scoped to a child config —
# notably `dotnet` in backend/mise.toml — resolve when turbo spawns a package
# script in its own dir, which doesn't re-trigger mise's directory hook.
_.path = ["{{config_root}}/node_modules/.bin", "{{env.HOME}}/.local/share/mise/shims"]
TURBO_TEAM = "alan-4087s-projects"

